name: Build Packages

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.container.name }} (${{ matrix.architecture.name }})
    runs-on: ${{ matrix.architecture.runner }}
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - name: amd64
            runner: ubuntu-latest
          - name: arm64
            runner: ubuntu-24.04-arm
        container:
          - name: debian-12
            image: debian:12
          - name: debian-13
            image: debian:13
          - name: ubuntu-22.04
            image: ubuntu:22.04
          - name: ubuntu-24.04
            image: ubuntu:24.04
          - name: ubuntu-26.04
            image: ubuntu:26.04
    container:
      image: ${{ matrix.container.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Show build architecture
        run: dpkg --print-architecture

      - name: Build squid
        run: bash build.sh

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: debian-package-${{ matrix.container.name }}-${{ matrix.architecture.name }}
          path: ./pkgs/*.deb

  release:
    name: Release Packages
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: ./pkgs
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./pkgs/*.deb"
          tag: ${{ github.ref_name }}
